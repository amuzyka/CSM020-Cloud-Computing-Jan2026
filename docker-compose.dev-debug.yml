version: '3.8'

services:
  # Main App (Resource Server) - Development with Debug
  miniwall-app:
    build:
      context: ./miniwall-app
      dockerfile: Dockerfile.dev
    container_name: miniwall-app-dev-debug
    ports:
      - "3000:3000"  # Direct access for development
      - "9229:9229"  # Debug port
    env_file:
      - .env.development
    environment:
      - NODE_ENV=development
      - MONGODB_URI=mongodb://admin:admin123@mongodb-app:27017/miniwall-dev?authSource=admin
      - AUTH_SERVER_URL=http://miniwall-auth-server:4000
    volumes:
      # Shared volume for development with hot reload
      - ./miniwall-app:/app
      - /app/node_modules  # Prevent node_modules from being overwritten
      - miniwall-app-dev-data:/app/data
      - miniwall-dev-logs:/app/logs
    command: npm run start:dev
    depends_on:
      - mongodb-app
      - miniwall-auth-server
    networks:
      - miniwall-network
    restart: unless-stopped

  # Auth Server (Authorization Server) - Development with Debug
  miniwall-auth-server:
    build:
      context: ./miniwall-auth-server
      dockerfile: Dockerfile.dev
    container_name: miniwall-auth-server-dev-debug
    ports:
      - "4000:4000"  # Direct access for development
      - "9230:9230"  # Debug port
    env_file:
      - .env.development
    environment:
      - NODE_ENV=development
      - MONGODB_URI=mongodb://admin:admin123@mongodb-auth:27017/miniwall-auth-dev?authSource=admin
      - JWT_SECRET=dev-jwt-secret-key-change-in-production
      - PORT=4000
    volumes:
      # Shared volume for development with hot reload
      - ./miniwall-auth-server:/app
      - /app/node_modules  # Prevent node_modules from being overwritten
      - miniwall-auth-dev-data:/app/data
      - miniwall-dev-logs:/app/logs
    command: npm run start:dev
    depends_on:
      - mongodb-auth
    networks:
      - miniwall-network
    restart: unless-stopped

  # MongoDB for Main App - Development
  mongodb-app:
    image: mongo:8.0
    container_name: miniwall-mongodb-app-dev-debug
    env_file:
      - .env.development
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=admin123
      - MONGO_INITDB_DATABASE=miniwall-dev
    ports:
      - "27017:27017"  # Direct access for development
    volumes:
      - mongodb-app-dev-debug-data:/data/db
      - ./mongo-init-app.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    networks:
      - miniwall-network
    restart: unless-stopped

  # MongoDB for Auth Server - Development
  mongodb-auth:
    image: mongo:8.0
    container_name: miniwall-mongodb-auth-dev-debug
    env_file:
      - .env.development
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=admin123
      - MONGO_INITDB_DATABASE=miniwall-auth-dev
    ports:
      - "27018:27017"  # Different port to avoid conflict with local MongoDB
    volumes:
      - mongodb-auth-dev-debug-data:/data/db
      - ./mongo-init-auth.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    networks:
      - miniwall-network
    restart: unless-stopped

  # Nginx Reverse Proxy - Development
  nginx:
    image: nginx:alpine
    container_name: miniwall-nginx-dev-debug
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.dev.conf:/etc/nginx/nginx.conf:ro
      - miniwall-dev-logs:/var/log/nginx
    depends_on:
      - miniwall-app
      - miniwall-auth-server
    networks:
      - miniwall-network
    restart: unless-stopped

volumes:
  # Shared volumes for development
  miniwall-app-dev-data:
    driver: local
  miniwall-auth-dev-data:
    driver: local
  mongodb-app-dev-debug-data:
    driver: local
  mongodb-auth-dev-debug-data:
    driver: local
  miniwall-dev-logs:
    driver: local

networks:
  miniwall-network:
    driver: bridge
