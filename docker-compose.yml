
services:
  # Main App (Resource Server)
  miniwall-app:
    build:
      context: ./miniwall-app
      dockerfile: Dockerfile
    container_name: miniwall-app
    # Internal only - accessible via nginx
    env_file:
      - .env.production
    environment:
      - NODE_ENV=production
      - MONGODB_URI=mongodb://${MONGO_APP_ROOT_USERNAME}:${MONGO_APP_ROOT_PASSWORD}@mongodb-app:27017/miniwall?authSource=admin
      - AUTH_SERVER_URL=http://miniwall-auth-server:4000
    volumes:
      - miniwall-app-data:/app/data
      - miniwall-logs:/app/logs
    depends_on:
      - mongodb-app
      - miniwall-auth-server
    networks:
      - miniwall-network
    restart: unless-stopped

  # Auth Server (Authorization Server)
  miniwall-auth-server:
    build:
      context: ./miniwall-auth-server
      dockerfile: Dockerfile
    container_name: miniwall-auth-server
    # Internal only - accessible via nginx
    env_file:
      - .env.production
    environment:
      - NODE_ENV=production
      - MONGODB_URI=mongodb://${MONGO_AUTH_ROOT_USERNAME}:${MONGO_AUTH_ROOT_PASSWORD}@mongodb-auth:27017/miniwall-auth?authSource=admin
      - JWT_SECRET=${JWT_SECRET:-your-super-secret-jwt-key-change-in-production}
      - PORT=4000
    volumes:
      - miniwall-auth-data:/app/data
      - miniwall-logs:/app/logs
    depends_on:
      - mongodb-auth
    networks:
      - miniwall-network
    restart: unless-stopped

  # MongoDB for Main App
  mongodb-app:
    image: mongo:8.0
    container_name: miniwall-mongodb-app
    env_file:
      - .env.production
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_APP_ROOT_USERNAME:-admin}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_APP_ROOT_PASSWORD:-admin123}
      - MONGO_INITDB_DATABASE=miniwall
    # Internal only - accessible via nginx
    volumes:
      - mongodb-app-data:/data/db
    networks:
      - miniwall-network
    restart: unless-stopped

  # MongoDB for Auth Server
  mongodb-auth:
    image: mongo:8.0
    container_name: miniwall-mongodb-auth
    env_file:
      - .env.production
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_AUTH_ROOT_USERNAME:-admin}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_AUTH_ROOT_PASSWORD:-admin123}
      - MONGO_INITDB_DATABASE=miniwall-auth
      - OAUTH2_CLIENT_ID=${OAUTH2_CLIENT_ID:-miniwall-client}
      - OAUTH2_CLIENT_SECRET=${OAUTH2_CLIENT_SECRET:-miniwall-client-secret}
    # Internal only - accessible via nginx
    volumes:
      - mongodb-auth-data:/data/db
      - ./mongo-init-auth.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    networks:
      - miniwall-network
    restart: unless-stopped

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: miniwall-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx-logs:/var/log/nginx
    depends_on:
      - miniwall-app
      - miniwall-auth-server
    networks:
      - miniwall-network
    restart: unless-stopped

volumes:
  # Shared volumes
  miniwall-app-data:
    driver: local
  miniwall-auth-data:
    driver: local
  mongodb-app-data:
    driver: local
  mongodb-auth-data:
    driver: local
  miniwall-logs:
    driver: local
  nginx-logs:
    driver: local

networks:
  miniwall-network:
    driver: bridge
